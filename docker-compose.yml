services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3030:3000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lumen_yoga"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
