services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:-strootmann}
        NEXT_PUBLIC_GOOGLE_FEATURABLE_WIDGET: ${NEXT_PUBLIC_GOOGLE_FEATURABLE_WIDGET:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:80"
    networks:
      - mann-ingress

networks:
  mann-ingress:
    external: true
